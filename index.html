<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style & Co — Gestion Stock</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --pink:#0D2B6B;--pink2:#1A3F8F;--pink-light:#E3E9F7;--pink-pale:#EEF2FB;
  --blue:#1565C0;--blue2:#1976D2;--blue-light:#E3F0FC;--blue-pale:#EEF5FF;
  --dark:#1A0A2E;--white:#FFFFFF;--cream:#FDF8FF;
  --green:#2D7A4F;--green-bg:#E8F5EE;
  --orange:#C45E1A;--orange-bg:#FEF0E6;
  --red:#B52828;--red-bg:#FDEAEA;
  --gray:#8A7E96;--border:#EAD6F0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh;}

#loader{position:fixed;inset:0;background:linear-gradient(135deg,var(--pink),var(--pink2));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;}
#loader .logo-load{font-family:'Cormorant Garamond',serif;color:white;font-size:36px;font-weight:700;margin-bottom:16px;text-shadow:0 2px 10px rgba(0,0,0,0.2);}
#loader .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin .8s linear infinite;}
#loader .load-txt{color:rgba(255,255,255,0.8);font-size:13px;margin-top:12px;}
@keyframes spin{to{transform:rotate(360deg)}}

#syncBar{background:var(--pink);color:white;font-size:12px;text-align:center;padding:4px;display:none;}
#syncBar.show{display:block;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--pink);color:white;padding:10px 22px;border-radius:30px;font-size:13px;font-weight:600;display:none;z-index:500;box-shadow:0 4px 20px rgba(13,43,107,0.4);}

header{background:linear-gradient(135deg,var(--pink),var(--pink2));padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(13,43,107,0.3);}
.logo{font-family:'Cormorant Garamond',serif;color:white;font-size:24px;font-weight:700;letter-spacing:1px;line-height:1;}
.logo small{color:rgba(255,255,255,0.75);font-size:10px;display:block;letter-spacing:3px;font-family:'DM Sans',sans-serif;font-weight:400;margin-top:1px;}
.hdr-btns{display:flex;gap:8px;}

.tabs{display:flex;gap:4px;background:linear-gradient(135deg,var(--pink),var(--pink2));padding:0 24px 12px;border-bottom:2px solid rgba(255,255,255,0.3);}
.tab{padding:6px 16px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:transparent;color:rgba(255,255,255,0.7);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
.tab:hover{background:rgba(255,255,255,0.15);color:white;}
.tab.active{background:white;color:var(--pink);font-weight:700;border-color:white;}

.kpi-bar{display:flex;gap:10px;padding:16px 24px;flex-wrap:wrap;}
.kpi{background:var(--white);border:2px solid var(--border);border-radius:16px;padding:12px 18px;text-align:center;flex:1;min-width:90px;max-width:150px;box-shadow:0 2px 12px rgba(13,43,107,0.08);}
.kpi-val{font-size:28px;font-weight:700;font-family:'Cormorant Garamond',serif;}
.kpi-label{font-size:10px;color:var(--gray);margin-top:1px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}

.toolbar{display:flex;gap:8px;padding:0 24px 14px;align-items:center;flex-wrap:wrap;}
.search-wrap{position:relative;flex:1;min-width:180px;max-width:300px;}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:2px solid var(--border);border-radius:25px;font-size:13px;background:var(--white);font-family:'DM Sans',sans-serif;outline:none;}
.search-wrap input:focus{border-color:var(--pink);}
.si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--pink);font-size:14px;}

.btn{padding:9px 18px;border-radius:25px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-pink{background:linear-gradient(135deg,var(--pink),var(--pink2));color:white;box-shadow:0 3px 12px rgba(13,43,107,0.3);}
.btn-pink:hover{box-shadow:0 4px 16px rgba(13,43,107,0.5);transform:translateY(-1px);}
.btn-blue{background:linear-gradient(135deg,var(--pink),var(--pink2));color:white;box-shadow:0 3px 12px rgba(13,43,107,0.3);}
.btn-outline{background:transparent;border:2px solid var(--border);color:var(--dark);}
.btn-outline:hover{border-color:var(--pink);color:var(--pink);}

.page{display:none;padding:0 24px 40px;}
.page.active{display:block;}

/* CARDS */
.models-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;}

.model-card{background:var(--white);border:2px solid var(--border);border-radius:20px;overflow:hidden;transition:all .2s;box-shadow:0 2px 12px rgba(13,43,107,0.06);}
.model-card:hover{box-shadow:0 8px 30px rgba(13,43,107,0.15);transform:translateY(-2px);}

.card-head{background:linear-gradient(135deg,var(--pink),var(--pink2));padding:0;position:relative;overflow:hidden;}

/* Photo modele */


.card-head-info{padding:10px 14px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(135deg,var(--pink),var(--pink2));}
.card-name{font-family:'Cormorant Garamond',serif;color:white;font-size:18px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,0.2);}

.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.3px;}
.b-ok{background:var(--green-bg);color:var(--green);}
.b-low{background:var(--orange-bg);color:var(--orange);}
.b-out{background:var(--red-bg);color:var(--red);}

.card-body{padding:14px;}

.tailles-row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:12px;}
.taille-cell{text-align:center;}
.t-label{font-size:10px;font-weight:700;color:var(--gray);letter-spacing:.5px;margin-bottom:3px;}
.t-dispo{font-size:20px;font-weight:700;font-family:'Cormorant Garamond',serif;padding:6px 4px;border-radius:10px;}
.t-ok{background:var(--green-bg);color:var(--green);}
.t-low{background:var(--orange-bg);color:var(--orange);}
.t-out{background:var(--red-bg);color:var(--red);}

.detail-section{display:none;margin-top:12px;padding-top:12px;border-top:2px dashed var(--border);animation:fadeIn .2s;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.detail-section.open{display:block;}

.d-label-row{display:grid;grid-template-columns:64px repeat(6,1fr);gap:5px;align-items:center;margin-bottom:4px;}
.d-row{display:grid;grid-template-columns:64px repeat(6,1fr);gap:5px;align-items:center;margin-bottom:5px;}
.d-row-label{font-size:11px;font-weight:600;}
.d-input{width:100%;text-align:center;padding:5px 2px;border:2px solid var(--border);border-radius:8px;font-size:13px;font-weight:700;font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--dark);outline:none;}
.d-input:focus{border-color:var(--pink);background:var(--white);}
.d-input.v{background:var(--pink-light);}
.d-input.v:focus{border-color:var(--pink);}
.d-input.r{background:var(--pink-light);}
.d-input.r:focus{border-color:var(--pink);}

.card-foot{display:flex;gap:6px;align-items:center;padding-top:10px;border-top:1px solid var(--border);flex-wrap:wrap;justify-content:space-between;}
.chips{display:flex;gap:5px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;}
.ch-s{background:var(--pink-pale);color:var(--pink);}
.ch-v{background:var(--pink-light);color:var(--pink);}
.ch-r{background:var(--pink-light);color:var(--pink2);}
.ch-d{background:var(--green-bg);color:var(--green);}
.ch-d.zero{background:var(--red-bg);color:var(--red);}

.btn-detail{padding:4px 14px;border-radius:20px;border:2px solid var(--border);background:transparent;font-size:11px;font-weight:600;cursor:pointer;color:var(--gray);transition:all .2s;font-family:'DM Sans',sans-serif;}
.btn-detail:hover,.btn-detail.open{border-color:var(--pink);color:var(--pink);}

/* RECAP */
.rtable{width:100%;border-collapse:collapse;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(13,43,107,0.08);margin-bottom:20px;}
.rtable th{background:linear-gradient(135deg,var(--pink),var(--pink2));color:white;font-weight:700;font-size:11px;padding:12px;text-align:center;letter-spacing:.3px;}
.rtable td{padding:10px 12px;text-align:center;font-size:13px;border-bottom:1px solid var(--border);}
.rtable tr:last-child td{border-bottom:none;}
.rtable tr:nth-child(even) td{background:var(--pink-pale);}
.rtable .tr-total td{background:linear-gradient(135deg,var(--pink),var(--pink2))!important;color:white;font-weight:700;}
.rtable td:first-child{text-align:left;font-weight:600;}
.pbar{background:var(--border);border-radius:10px;height:6px;width:70px;margin:2px auto 0;overflow:hidden;}
.pfill{height:100%;border-radius:10px;}

/* JOURNAL */
.jtable{width:100%;border-collapse:collapse;background:var(--white);border-radius:16px;overflow:hidden;box-shadow:0 2px 16px rgba(13,43,107,0.08);}
.jtable th{background:linear-gradient(135deg,var(--pink),var(--pink2));color:white;font-weight:600;font-size:11px;padding:11px 12px;text-align:left;}
.jtable td{padding:9px 12px;font-size:12px;border-bottom:1px solid var(--border);}
.jtable tr:last-child td{border-bottom:none;}
.jtable tr:hover td{background:var(--pink-pale);}
.tbadge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;}
.tv{background:var(--pink-light);color:var(--pink);}
.tr2{background:var(--pink-light);color:var(--pink);}
.te{background:var(--green-bg);color:var(--green);}
.exp{background:#EDE7F6;color:#5E35B1;}
.ta{background:var(--orange-bg);color:var(--orange);}
.empty{text-align:center;color:var(--gray);padding:40px;font-style:italic;}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--white);border-radius:24px;padding:28px;width:92%;max-width:420px;box-shadow:0 20px 60px rgba(13,43,107,0.2);}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:24px;background:linear-gradient(135deg,var(--pink),var(--pink2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px;}
.modal label{font-size:11px;font-weight:600;color:var(--gray);display:block;margin-bottom:3px;margin-top:10px;text-transform:uppercase;letter-spacing:.4px;}
.modal select,.modal input{width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;color:var(--dark);}
.modal select:focus,.modal input:focus{border-color:var(--pink);}
.mbts{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}

@media print{
  #loader,#syncBar,header,.tabs,.toolbar,.btn-detail,.hdr-btns,.overlay,#toast{display:none!important;}
  .page{display:block!important;padding:0!important;}
  #page-stock{display:block!important;}
  .detail-section{display:block!important;}
  .model-card{break-inside:avoid;margin-bottom:8px;}
  body{background:white;}
}
@media(max-width:600px){
  header,.tabs,.kpi-bar,.toolbar,.page{padding-left:12px;padding-right:12px;}
  .models-grid{grid-template-columns:1fr;}
  .kpi{max-width:none;}
}
</style>
</head>
<body>

<div id="loader">
  <div class="logo-load">Style & Co</div>
  <div class="spinner"></div>
  <div class="load-txt">Connexion à la base de données…</div>
</div>

<div id="syncBar">🔄 Synchronisation…</div>
<div id="toast"></div>

<header>
  <div class="logo">Style & Co <small>GESTION DE STOCK · ÉTÉ 2026</small></div>
  <div class="hdr-btns">
    <button class="btn btn-blue" onclick="exportPDF()">🖨 PDF</button>
    <button class="btn btn-pink" onclick="openModal()">+ Mouvement</button>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showPage('stock',this)">📦 Stock</button>
  <button class="tab" onclick="showPage('recap',this)">📊 Récap</button>
  <button class="tab" onclick="showPage('journal',this)">📋 Journal</button>
  <button class="tab" onclick="showPage('capital',this)">💼 Capital</button>
</div>

<div class="kpi-bar" id="kpiBar"></div>

<div class="toolbar" id="toolbar">
  <div class="search-wrap">
    <span class="si">🔍</span>
    <input type="text" id="searchInput" placeholder="Rechercher un modèle…" oninput="renderStock()">
  </div>
  <select id="tailleFilter" onchange="renderParTaille()" style="padding:8px 14px;border:2px solid var(--border);border-radius:25px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;cursor:pointer;">
    <option value="">📊 Vue par taille</option>
    <option value="S">Taille S</option>
    <option value="M">Taille M</option>
    <option value="L">Taille L</option>
    <option value="XL">Taille XL</option>
    <option value="2XL">Taille 2XL</option>
    <option value="3XL">Taille 3XL</option>
  </select>
  <button class="btn btn-outline" onclick="exportCSV()">⬇ CSV</button>
</div>
<div id="vueTaille" style="display:none;padding:0 24px 14px;"></div>

<div class="page active" id="page-stock">
  <div class="models-grid" id="modelsGrid"></div>
</div>
<div class="page" id="page-recap"></div>
<div class="page" id="page-journal">
  <table class="jtable" id="journalTable"></table>
</div>
<div class="page" id="page-capital">
  <div id="capitalContent"></div>
</div>

<!-- CAPITAL MODAL -->
<div class="overlay" id="overlayCapital">
  <div class="modal">
    <h3>💼 Ajouter un apport capital</h3>
    <label>Montant (MAD)</label>
    <input type="number" id="capMontant" placeholder="ex: 5000" min="0">
    <label>Payé par</label>
    <input type="text" id="capPayePar" placeholder="ex: Awatif, Sara…">
    <label>Commentaire</label>
    <input type="text" id="capComment" placeholder="ex: Achat stock burkini lot 2">
    <div class="mbts">
      <button class="btn btn-outline" onclick="closeCapitalModal()">Annuler</button>
      <button class="btn btn-blue" onclick="saveCapital()">Enregistrer</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>Enregistrer un mouvement</h3>
    <label>Modèle</label>
    <select id="mvModele"></select>
    <label>Taille</label>
    <select id="mvTaille"><option>S</option><option>M</option><option>L</option><option>XL</option><option>2XL</option><option>3XL</option></select>
    <label>Type</label>
    <select id="mvType">
      <option value="vente">🛒 Vente</option>
      <option value="reserve">🔖 Réservation</option>
      <option value="expedie">📦 Expédié</option>
      <option value="entree">📥 Entrée stock</option>
      <option value="annul">↩️ Annulation réservation</option>
    </select>
    <label>Quantité</label>
    <input type="number" id="mvQte" value="1" min="1">
    <div id="prixRow" style="display:none">
      <label>Prix de vente (MAD)</label>
      <input type="number" id="mvPrix" placeholder="ex: 850" min="0">
    </div>
    <label>Remarque (optionnel)</label>
    <input type="text" id="mvRem" placeholder="ex: client Fatima, commande #12…">
    <div class="mbts">
      <button class="btn btn-outline" onclick="closeModal()">Annuler</button>
      <button class="btn btn-pink" onclick="saveMvt()">Enregistrer</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAx1sj5sguBQ7AOxUYmoQB3srUpWaHBrao",
  authDomain: "styleandco-7d387.firebaseapp.com",
  databaseURL: "https://styleandco-7d387-default-rtdb.firebaseio.com",
  projectId: "styleandco-7d387",
  storageBucket: "styleandco-7d387.appspot.com",
  messagingSenderId: "67398673960",
  appId: "1:67398673960:web:0fc69c90312b3822885b8b"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const TAILLES = ["S","M","L","XL","2XL","3XL"];

// Photos depuis le catalogue PDF (pages extraites comme images base64 ou URLs publiques)
const MODELES_DATA = [
  { nom:"Verdana",         emoji:"🌿", couleur:"#7B9E4E" },
  { nom:"Ivory Dune",      emoji:"🤎", couleur:"#C4956A" },
  { nom:"Léopard Chic",    emoji:"🐆", couleur:"#8B6914" },
  { nom:"Modèle Riviera",  emoji:"💙", couleur:"#1565C0" },
  { nom:"Black Wave",      emoji:"🖤", couleur:"#2C2C2C" },
  { nom:"Blue Sea",        emoji:"🔵", couleur:"#1976D2" },
  { nom:"Modèle Infinity", emoji:"💜", couleur:"#6A1B9A" },
  { nom:"Modèle Mejestic", emoji:"👑", couleur:"#1565C0" },
  { nom:"Orchidée Royale", emoji:"🌸", couleur:"#8E24AA" },
  { nom:"Perla Noire",     emoji:"🖤", couleur:"#1A1A1A" },
  { nom:"Marvea",          emoji:"🎨", couleur:"#0D2B6B" },
  { nom:"Azura",           emoji:"💙", couleur:"#1976D2" },
  { nom:"Navy Oasis",      emoji:"⚓", couleur:"#0D47A1" },
  { nom:"Playa",           emoji:"🌊", couleur:"#00695C" },
];

function defaultData(){
  return MODELES_DATA.map(m=>({nom:m.nom,
    stock:Object.fromEntries(TAILLES.map(t=>[t,1])),
    vendu:Object.fromEntries(TAILLES.map(t=>[t,0])),
    reserve:Object.fromEntries(TAILLES.map(t=>[t,0]))
  }));
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.display='block';
  setTimeout(()=>t.style.display='none',2500);
}
function syncIndicator(on){
  document.getElementById('syncBar').classList.toggle('show',on);
}

let DATA=[], JOURNAL=[], CAPITAL=[];
const NOMS_DEFAULT=["Verdana","Ivory Dune","Léopard Chic","Modèle Riviera","Black Wave","Blue Sea","Modèle Infinity","Modèle Mejestic","Orchidée Royale","Perla Noire","Marvea","Azura","Navy Oasis","Playa"];

const stockRef=ref(db,'stock');
const journalRef=ref(db,'journal');
const capitalRef=ref(db,'capital');

onValue(stockRef,snap=>{
  const val=snap.val();
  if(val){
    const arr=Array.isArray(val)?val:Object.values(val);
    // Keep only stock field, ignore vendu/reserve (journal is source of truth)
    DATA=arr.map(m=>({
      nom:m.nom,
      stock:Object.fromEntries(TAILLES.map(t=>[t,parseInt(m.stock[t])||1]))
    }));
  } else {
    DATA=defaultData();
    set(stockRef,DATA);
  }
  document.getElementById('loader').style.display='none';
  renderKPI(); renderStock();
});

onValue(journalRef,snap=>{
  const val=snap.val();
  JOURNAL=val?Object.values(val):[];
  renderKPI();
  if(document.getElementById('page-journal').classList.contains('active')) renderJournal();
});

onValue(capitalRef,snap=>{
  const val=snap.val();
  CAPITAL=val?Object.values(val):[];
  renderKPI();
  if(document.getElementById('page-capital') && document.getElementById('page-capital').classList.contains('active')) renderCapital();
});

function saveStock(){
  syncIndicator(true);
  set(stockRef,DATA).then(()=>{ syncIndicator(false); showToast('✅ Sauvegardé'); });
}
function addJournal(entry){ push(journalRef,entry); }

// Stock initial par taille (jamais modifié)
function tStock(m){return TAILLES.reduce((s,t)=>s+(parseInt(m.stock[t])||0),0);}

// Mouvements depuis JOURNAL uniquement — source de vérité absolue
function jCount(nom,t,types){
  return JOURNAL
    .filter(j=>types.includes(j.type)&&j.modele===nom&&(t?j.taille===t:true))
    .reduce((s,j)=>s+(parseInt(j.qte)||1),0);
}
function jVendu(nom,t){return jCount(nom,t,['vente']);}
function jRes(nom,t){return Math.max(0, jCount(nom,t,['reserve']) - jCount(nom,t,['annul']));}
function jExp(nom,t){return jCount(nom,t,['expedie']);}

// Dispo = stock initial - vendus - réservés - expédiés
function dispo(m,t){
  const s=parseInt(m.stock[t])||0;
  return Math.max(0, s - jVendu(m.nom,t) - jRes(m.nom,t) - jExp(m.nom,t));
}
function tDispo(m){return TAILLES.reduce((s,t)=>s+dispo(m,t),0);}
function tVendu(m){return TAILLES.reduce((s,t)=>s+jVendu(m.nom,t),0);}
function tRes(m){return TAILLES.reduce((s,t)=>s+jRes(m.nom,t),0);}
function tExp(m){return TAILLES.reduce((s,t)=>s+jExp(m.nom,t),0);}

function statutBadge(m){
  const d=tDispo(m);
  if(d<=0) return '<span class="badge b-out">Rupture</span>';
  if(d<=3) return '<span class="badge b-low">Stock faible</span>';
  return '<span class="badge b-ok">Disponible</span>';
}

function getMeta(nom){

function renderKPI(){
  // Tout calculé depuis JOURNAL = source de vérité unique
  const tv  = JOURNAL.filter(j=>j.type==='vente').reduce((s,j)=>s+(parseInt(j.qte)||1),0);
  const tr  = Math.max(0, JOURNAL.filter(j=>j.type==='reserve').reduce((s,j)=>s+(parseInt(j.qte)||1),0)
             - JOURNAL.filter(j=>j.type==='annul').reduce((s,j)=>s+(parseInt(j.qte)||1),0));
  const texp= JOURNAL.filter(j=>j.type==='expedie').reduce((s,j)=>s+(parseInt(j.qte)||1),0);
  const ca  = JOURNAL.filter(j=>j.type==='vente'&&j.prix).reduce((s,j)=>s+(parseFloat(j.prix)||0)*(parseInt(j.qte)||1),0);
  // Stock total et dispo depuis DATA (source de vérité pour les quantités physiques)
  const ts  = DATA.reduce((s,m)=>s+tStock(m),0);
  const td  = Math.max(0, ts - tv - Math.max(0,tr) - texp);
  // Capital from CAPITAL array
  const capital = CAPITAL.reduce((s,c)=>s+(parseFloat(c.montant)||0),0);
  const tauxPct = capital>0 ? Math.round(ca/capital*100) : 0;
  const tauxColor = tauxPct>=100?'#2D7A4F':tauxPct>=50?'#C45E1A':'#B52828';
  document.getElementById('kpiBar').innerHTML=`
    <div class="kpi"><div class="kpi-val" style="color:var(--blue)">${ts}</div><div class="kpi-label">Stock total</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#2D7A4F">${tv}</div><div class="kpi-label">🛒 Vendus</div></div>
    <div class="kpi"><div class="kpi-val" style="color:#5E35B1">${texp}</div><div class="kpi-label">📦 Expédiés</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--pink2)">${Math.max(0,tr)}</div><div class="kpi-label">🔖 Réservés</div></div>
    <div class="kpi"><div class="kpi-val" style="color:var(--blue2)">${td}</div><div class="kpi-label">✅ Disponibles</div></div>
    <div class="kpi" style="border-color:#2D7A4F;min-width:130px"><div class="kpi-val" style="color:#2D7A4F;font-size:20px">${ca.toLocaleString('fr-FR')}</div><div class="kpi-label">💰 CA MAD</div></div>
    <div class="kpi" style="border-color:#1565C0;min-width:130px"><div class="kpi-val" style="color:#1565C0;font-size:20px">${capital.toLocaleString('fr-FR')}</div><div class="kpi-label">💼 Capital MAD</div></div>
    <div class="kpi" style="border-color:${tauxColor};min-width:110px">
      <div class="kpi-val" style="color:${tauxColor};font-size:22px">${tauxPct}%</div>
      <div class="kpi-label">📈 CA / Capital</div>
      <div style="background:#EEE;border-radius:10px;height:6px;margin-top:4px;overflow:hidden"><div style="width:${Math.min(tauxPct,100)}%;height:100%;background:${tauxColor};border-radius:10px;transition:width .5s"></div></div>
    </div>`;
}

  if(taille) document.getElementById('mvTaille').value=taille;

document.getElementById('mvType').addEventListener('change',function(){
  document.getElementById('prixRow').style.display=this.value==='vente'?'block':'none';
});
window.closeModal=function(){
  document.getElementById('overlay').classList.remove('open');

};
window.saveMvt=function(){
  const nom=document.getElementById('mvModele').value;
  const t=document.getElementById('mvTaille').value;
  const type=document.getElementById('mvType').value;
  const qte=parseInt(document.getElementById('mvQte').value)||1;
  const rem=document.getElementById('mvRem').value;
  const prix=type==='vente'?(parseFloat(document.getElementById('mvPrix').value)||0):0;
  const editIdx=document.getElementById('overlay').dataset.editIdx;

  if(editIdx!==undefined && editIdx!==''){
    // EDIT MODE — reverse old effect first
    const old=JOURNAL[parseInt(editIdx)];
    const mi2=DATA.findIndex(m=>m.nom===old.modele);
    if(mi2>=0){
      if(old.type==='vente')   DATA[mi2].vendu[old.taille]=Math.max(0,DATA[mi2].vendu[old.taille]-old.qte);
      if(old.type==='reserve') DATA[mi2].reserve[old.taille]=Math.max(0,DATA[mi2].reserve[old.taille]-old.qte);
      if(old.type==='entree')  DATA[mi2].stock[old.taille]=Math.max(0,DATA[mi2].stock[old.taille]-old.qte);
      if(old.type==='annul')   DATA[mi2].reserve[old.taille]=Math.max(0,DATA[mi2].reserve[old.taille]+old.qte);
      // expedie: no stock effect to reverse
    }
    delete document.getElementById('overlay').dataset.editIdx;
  }

  const mi=DATA.findIndex(m=>m.nom===nom);
  if(mi<0)return;
  if(type==='vente')   DATA[mi].vendu[t]=Math.max(0,DATA[mi].vendu[t]+qte);
  if(type==='reserve') DATA[mi].reserve[t]=Math.max(0,DATA[mi].reserve[t]+qte);
  if(type==='entree')  DATA[mi].stock[t]=Math.max(0,DATA[mi].stock[t]+qte);
  if(type==='annul')   DATA[mi].reserve[t]=Math.max(0,DATA[mi].reserve[t]-qte);
  // expedie: no stock change, info only

  const now=new Date();
  const entry={date:now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),modele:nom,taille:t,type,qte,remarque:rem,prix};

  if(editIdx!==undefined && editIdx!==''){
    JOURNAL[parseInt(editIdx)]=entry;
    set(journalRef,Object.fromEntries(JOURNAL.map((j,i)=>[i,j])));
    showToast('✅ Ligne modifiée');
  } else {
    addJournal(entry);
    showToast('✅ Mouvement enregistré');
  }

  saveStock(); closeModal(); renderKPI(); renderStock();
};

window.editPrix=function(idx){
  const j = JOURNAL[idx];
  if(!j || j.type !== 'vente') return;
  const newPrix = parseFloat(prompt(`Prix unitaire pour ${j.qte} x ${j.modele} (${j.taille}) en MAD :`, j.prix||''));
  if(isNaN(newPrix) || newPrix < 0) return;
  JOURNAL[idx].prix = newPrix;
  // Resave entire journal to Firebase
  set(journalRef, Object.fromEntries(JOURNAL.map((j,i)=>[i,j])));
  renderKPI();
  renderJournal();
  showToast('✅ Prix mis à jour !');
};

window.editJournal=function(idx){
  const j=JOURNAL[idx];
  if(!j) return;
  const TL={vente:'Vente',reserve:'Réservation',entree:'Entrée',annul:'Annulation'};
  // Pre-fill modal
  document.getElementById('mvModele').innerHTML=DATA.map(m=>`<option>${m.nom}</option>`).join('');
  document.getElementById('mvModele').value=j.modele;
  document.getElementById('mvTaille').value=j.taille;
  document.getElementById('mvType').value=j.type;
  document.getElementById('mvQte').value=j.qte;
  document.getElementById('mvRem').value=j.remarque||'';
  document.getElementById('prixRow').style.display=j.type==='vente'?'block':'none';
  document.getElementById('mvPrix').value=j.prix||'';
  // Mark as edit mode
  document.getElementById('overlay').dataset.editIdx=idx;
  document.getElementById('overlay').classList.add('open');
};

window.deleteJournal=function(idx){
  if(!confirm('Supprimer cette ligne du journal ?')) return;
  const j=JOURNAL[idx];
  // Reverse the stock effect
  const mi=DATA.findIndex(m=>m.nom===j.modele);
  if(mi>=0){
    if(j.type==='vente')   DATA[mi].vendu[j.taille]=Math.max(0,DATA[mi].vendu[j.taille]-j.qte);
    if(j.type==='reserve') DATA[mi].reserve[j.taille]=Math.max(0,DATA[mi].reserve[j.taille]-j.qte);
    if(j.type==='entree')  DATA[mi].stock[j.taille]=Math.max(0,DATA[mi].stock[j.taille]-j.qte);
    if(j.type==='annul')   DATA[mi].reserve[j.taille]=Math.max(0,DATA[mi].reserve[j.taille]+j.qte);
    saveStock();
  }
  JOURNAL.splice(idx,1);
  set(journalRef,JOURNAL.length>0?Object.fromEntries(JOURNAL.map((j,i)=>[i,j])):{});
  renderKPI(); renderJournal();
  showToast('🗑️ Ligne supprimée');
};

window.convertReserve=function(idx){
  const j = JOURNAL[idx];
  if(!j || j.type !== 'reserve') return;
  const mi = DATA.findIndex(m=>m.nom===j.modele);
  if(mi<0) return;
  // Annuler la réservation
  DATA[mi].reserve[j.taille] = Math.max(0, DATA[mi].reserve[j.taille] - j.qte);
  // Ajouter comme vente
  DATA[mi].vendu[j.taille] = Math.max(0, DATA[mi].vendu[j.taille] + j.qte);
  saveStock();
  // Ouvrir modal vente avec les infos pré-remplies
  openModal(j.modele, j.taille, 'vente');
  showToast('🔖 Réservation convertie — ajoute le prix !');
  renderKPI(); renderStock();
};

window.openCapitalModal=function(){
  document.getElementById('capMontant').value='';
  document.getElementById('capPayePar').value='';
  document.getElementById('capComment').value='';
  document.getElementById('overlayCapital').classList.add('open');
};
window.closeCapitalModal=function(){
  document.getElementById('overlayCapital').classList.remove('open');
};
window.saveCapital=function(){
  const montant=parseFloat(document.getElementById('capMontant').value)||0;
  const payePar=document.getElementById('capPayePar').value;
  const comment=document.getElementById('capComment').value;
  if(!montant){showToast('⚠️ Montant requis');return;}
  const now=new Date();
  const entry={
    date:now.toLocaleDateString('fr-FR')+' '+now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),
    montant,payePar,comment
  };
  push(capitalRef,entry);
  closeCapitalModal();
  showToast('✅ Apport enregistré');
};
window.deleteCapital=function(idx){
  if(!confirm('Supprimer cet apport ?')) return;
  CAPITAL.splice(idx,1);
  set(capitalRef,CAPITAL.length>0?Object.fromEntries(CAPITAL.map((c,i)=>[i,c])):{});
  renderKPI(); renderCapital();
  showToast('🗑️ Apport supprimé');
};
function renderCapital(){
  const ca=JOURNAL.filter(j=>j.type==='vente'&&j.prix).reduce((s,j)=>s+(parseFloat(j.prix)||0)*(parseInt(j.qte)||1),0);
  const capital=CAPITAL.reduce((s,c)=>s+(parseFloat(c.montant)||0),0);
  const tauxPct=capital>0?Math.round(ca/capital*100):0;
  const tauxColor=tauxPct>=100?'#2D7A4F':tauxPct>=50?'#C45E1A':'#B52828';
  const rows=CAPITAL.map((c,i)=>`<tr>
    <td style="color:var(--gray);font-size:11px;white-space:nowrap">${c.date}</td>
    <td style="font-weight:700;color:#1565C0">${parseFloat(c.montant).toLocaleString('fr-FR')} MAD</td>
    <td><b>${c.payePar||'—'}</b></td>
    <td style="color:var(--gray)">${c.comment||'—'}</td>
    <td><button onclick="deleteCapital(${i})" style="padding:3px 8px;border-radius:20px;border:none;background:#FDEAEA;color:#B52828;font-size:10px;font-weight:700;cursor:pointer">🗑️</button></td>
  </tr>`).join('');

  document.getElementById('capitalContent').innerHTML=`
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;align-items:center;justify-content:space-between">
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <div class="kpi" style="border-color:#1565C0"><div class="kpi-val" style="color:#1565C0">${capital.toLocaleString('fr-FR')}</div><div class="kpi-label">💼 Capital total</div></div>
        <div class="kpi" style="border-color:#2D7A4F"><div class="kpi-val" style="color:#2D7A4F">${ca.toLocaleString('fr-FR')}</div><div class="kpi-label">💰 CA total</div></div>
        <div class="kpi" style="border-color:${tauxColor}">
          <div class="kpi-val" style="color:${tauxColor}">${tauxPct}%</div>
          <div class="kpi-label">📈 CA / Capital</div>
          <div style="background:#EEE;border-radius:10px;height:8px;margin-top:4px;overflow:hidden">
            <div style="width:${Math.min(tauxPct,100)}%;height:100%;background:${tauxColor};border-radius:10px;transition:width .5s"></div>
          </div>
        </div>
      </div>
      <button class="btn btn-blue" onclick="openCapitalModal()">+ Ajouter un apport</button>
    </div>
    ${CAPITAL.length===0?'<div class="empty">Aucun apport enregistré.</div>':`
    <table class="jtable">
      <thead><tr><th>Date</th><th>Montant</th><th>Payé par</th><th>Commentaire</th><th></th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`}`;
}

window.exportPDF=function(){
  // Créer une fenêtre d'impression avec layout condensé
  const now = new Date().toLocaleDateString('fr-FR');
  let html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    body{font-family:Arial,sans-serif;margin:15px;color:#1A0A2E;}
    h1{font-size:18px;text-align:center;color:#0D2B6B;margin-bottom:4px;}
    h2{font-size:12px;text-align:center;color:#888;margin-bottom:16px;font-weight:400;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{background:linear-gradient(135deg,#0D2B6B,#1976D2);color:white;padding:7px 5px;text-align:center;font-size:10px;}
    td{padding:5px 4px;text-align:center;border-bottom:1px solid #EAD6F0;vertical-align:middle;}
    td.nom{text-align:left;font-weight:700;font-size:11px;padding-left:8px;}
    tr:nth-child(even) td{background:#FFF0FA;}
    .zero{color:#B52828;font-weight:700;}
    .ok{color:#2D7A4F;font-weight:700;}
    .low{color:#C45E1A;font-weight:700;}
    .res{color:#1976D2;font-style:italic;font-size:10px;}
    .total-row td{background:linear-gradient(135deg,#0D2B6B,#1976D2)!important;color:white!important;font-weight:700;}
    .section-title{font-size:13px;font-weight:700;color:#0D2B6B;margin:4px 0 2px;padding-left:4px;border-left:3px solid #0D2B6B;}
  </style></head><body>
  <h1>🌊 Style & Co — Stock Burkini Été 2026</h1>
  <h2>Édité le ${now}</h2>
  <table>
    <thead>
      <tr>
        <th style="text-align:left;padding-left:8px">Modèle</th>
        <th>S</th><th>M</th><th>L</th><th>XL</th><th>2XL</th><th>3XL</th>
        <th>Total Dispo</th>
      </tr>
    </thead>
    <tbody>`;

  DATA.forEach(m => {
    const dispos = ["S","M","L","XL","2XL","3XL"].map(t => dispo(m,t));
    const totalD = dispos.reduce((a,b)=>a+b,0);
    const reserves = ["S","M","L","XL","2XL","3XL"].map(t => jRes(m.nom,t));

    const cells = dispos.map((d,i) => {
      const r = reserves[i];
      const cls = d<=0?'zero':d<=1?'low':'ok';
      const resHtml = r>0 ? `<br><span class="res">🔖${r}</span>` : '';
      return `<td class="${cls}">${d}${resHtml}</td>`;
    }).join('');

    html += `<tr>
      <td class="nom">${m.nom}</td>
      ${cells}
      <td class="${totalD<=0?'zero':totalD<=3?'low':'ok'}">${totalD}</td>
    </tr>`;
  });

  // Ligne total
  const totaux = ["S","M","L","XL","2XL","3XL"].map(t =>
    DATA.reduce((s,m)=>s+dispo(m,t),0)
  );
  const totalGlobal = totaux.reduce((a,b)=>a+b,0);
  html += `<tr class="total-row">
    <td style="text-align:left;padding-left:8px">TOTAL</td>
    ${totaux.map(t=>`<td>${t}</td>`).join('')}
    <td>${totalGlobal}</td>
  </tr>`;

  html += `</tbody></table>
  <p style="margin-top:16px;font-size:9px;color:#aaa;text-align:center">
    🔖 = quantité réservée · Style & Co @Styleandco.ma
  </p>
  </body></html>`;

  const win = window.open('','_blank');
  win.document.write(html);
  win.document.close();
  win.print();
};

window.exportCSV=function(){
  const rows=[["Modèle",...TAILLES.map(t=>`Stock ${t}`),...TAILLES.map(t=>`Vendus ${t}`),...TAILLES.map(t=>`Réservés ${t}`),...TAILLES.map(t=>`Dispo ${t}`),"Total Stock","Total Vendus","Total Réservés","Total Dispo"]];
  DATA.forEach(m=>{rows.push([m.nom,...TAILLES.map(t=>m.stock[t]),...TAILLES.map(t=>jVendu(m.nom,t)),...TAILLES.map(t=>jRes(m.nom,t)),...TAILLES.map(t=>dispo(m,t)),tStock(m),tVendu(m),tRes(m),tDispo(m)]);});
  const csv=rows.map(r=>r.join(';')).join('\n');
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='StyleCo_Stock_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
};

window.showPage=function(name,btn){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  btn.classList.add('active');
  document.getElementById('toolbar').style.display=name==='stock'?'flex':'none';
  if(name==='recap') renderRecap();
  if(name==='journal') renderJournal();
  if(name==='capital') renderCapital();
};

document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)window.closeModal();});
document.getElementById('overlayCapital').addEventListener('click',function(e){if(e.target===this)window.closeCapitalModal();});
</script>
